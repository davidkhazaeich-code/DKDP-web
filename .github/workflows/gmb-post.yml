name: Publish GMB Post on New Blog Article

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/blog/**.ts'
      - '!src/lib/blog/index.ts'
      - '!src/lib/blog/types.ts'

jobs:
  publish-gmb-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new blog articles
        id: detect
        run: |
          NEW_FILES=$(git diff HEAD~1 --name-only --diff-filter=A -- 'src/lib/blog/*.ts' | grep -v 'index.ts' | grep -v 'types.ts' || true)
          if [ -z "$NEW_FILES" ]; then
            echo "No new blog articles detected."
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            echo "New articles found:"
            echo "$NEW_FILES"
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "$NEW_FILES" > /tmp/new_articles.txt
          fi

      - name: Setup Python
        if: steps.detect.outputs.has_new == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.detect.outputs.has_new == 'true'
        run: pip install -r tools/requirements-gmb.txt

      - name: Publish GMB posts
        if: steps.detect.outputs.has_new == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GMB_CREDENTIALS: ${{ secrets.GOOGLE_GMB_CREDENTIALS }}
          GOOGLE_GMB_ACCOUNT_ID: ${{ secrets.GOOGLE_GMB_ACCOUNT_ID }}
          GOOGLE_GMB_LOCATION_ID: ${{ secrets.GOOGLE_GMB_LOCATION_ID }}
        run: |
          while IFS= read -r article_file; do
            echo "---"
            echo "Processing: $article_file"
            python tools/publish_gmb_post.py "$article_file"
          done < /tmp/new_articles.txt
